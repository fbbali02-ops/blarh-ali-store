<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<link rel="stylesheet" href="css/style.css">

<style>
.container{
    max-width:450px;
    margin:80px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:15px;
    margin:15px 0;
}

button{
    width:100%;
    padding:15px;
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

<h2>Forgot Password</h2>

<p>Enter your email address.</p>

<form id="forgotForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<button type="submit">
Send Reset Link
</button>

</form>

</div>

<script>

document.getElementById("forgotForm").addEventListener("submit",(e)=>{

e.preventDefault();

alert("Password reset feature will be connected after deployment.");

});

</script>

</body>
</html>
